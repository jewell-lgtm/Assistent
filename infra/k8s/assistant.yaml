apiVersion: v1
kind: Namespace
metadata:
  name: assistant
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant-server
  namespace: assistant
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: assistant-server
  template:
    metadata:
      labels:
        app: assistant-server
    spec:
      containers:
        - name: server
          image: assistant-server:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: assistant-secrets
                  key: API_TOKEN
            - name: OPSD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: assistant-secrets
                  key: OPSD_TOKEN
            - name: UPDATES_DIR
              value: /data/updates
            - name: REPO_DIR
              value: /repo
          volumeMounts:
            - name: updates
              mountPath: /data/updates
              readOnly: true
            - name: repo
              mountPath: /repo
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: 256Mi }
            limits: { memory: 2Gi }
      volumes:
        - name: updates
          hostPath:
            path: /Users/mattisfrommars/assistant-data/updates
            type: DirectoryOrCreate
        - name: repo
          hostPath:
            path: /Users/mattisfrommars/assistant
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: assistant-server
  namespace: assistant
spec:
  type: NodePort
  selector:
    app: assistant-server
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30880
